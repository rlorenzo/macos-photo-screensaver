name: Build and Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build PhotoScreensaver
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Show Swift version
      run: swift --version

    - name: Build PhotoScreensaver (Debug)
      run: |
        xcodebuild \
          -project PhotoScreensaver.xcodeproj \
          -scheme PhotoScreensaver \
          -configuration Debug \
          clean build \
          CONFIGURATION_BUILD_DIR="$PWD/build" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Build PhotoScreensaver (Release)
      run: |
        xcodebuild \
          -project PhotoScreensaver.xcodeproj \
          -scheme PhotoScreensaver \
          -configuration Release \
          clean build \
          CONFIGURATION_BUILD_DIR="$PWD/build" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Verify build artifacts
      run: |
        ls -lh build/
        if [ ! -f "build/PhotoScreensaver.saver/Contents/MacOS/PhotoScreensaver" ]; then
          echo "❌ Build artifact not found!"
          exit 1
        fi
        echo "✅ Build artifact verified"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PhotoScreensaver
        path: build/PhotoScreensaver.saver
        retention-days: 30

  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint
      run: |
        swiftlint version
        swiftlint lint --strict || true
